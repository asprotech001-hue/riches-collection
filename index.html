    <!-- Open Graph — controls how the link looks when pasted into WhatsApp, Facebook, etc. -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="ElSeyOn — The Digital Business Architect" />
    <meta property="og:description" content="Landing pages, business websites, and WhatsApp-driven systems for campus and regional businesses." />
    <meta property="og:image" content="/og-image.jpg" />
    <!-- Once you have a real domain, uncomment and fill this in — WhatsApp needs an
         absolute URL (not a relative path) to reliably fetch the preview image:
    <meta property="og:url" content="https://yourdomain.com" />
    <meta property="og:image" content="https://yourdomain.com/og-image.jpg" />
    -->

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ElSeyOn — The Digital Business Architect" />
    <meta name="twitter:description" content="Landing pages, business websites, and WhatsApp-driven systems for campus and regional businesses." />
    <meta name="twitter:image" content="/og-image.jpg" />
